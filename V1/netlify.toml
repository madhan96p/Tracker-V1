# netlify.toml
# ─────────────────────────────────────────────────────────
# Netlify build & deploy configuration.
#
# Since this is a pure static site (no build step),
# the publish directory is the project root itself.
#
# The [[redirects]] section makes all routes fall back to
# index.html so bookmarked URLs still work.

[build]
  publish   = "."          # Serve files from project root
  command   = ""           # No build command needed (vanilla JS)
  functions = "netlify/functions"

# HTTPS redirect (Netlify does this automatically for custom domains)
[[redirects]]
  from   = "http://*"
  to     = "https://:splat"
  status = 301

# SPA fallback — not strictly needed for a single-page app
# but good practice in case you add hash-less routing later.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
