# FTracker — Netlify Configuration
# Deploys a static site directly from the repo root.

[build]
  publish = "."       # Root contains index.html — no build step needed
  command = ""        # Pure HTML/CSS/JS, no compilation required

[build.environment]
  NODE_VERSION = "20"

# ─── Redirect everything to index.html (SPA fallback) ───
[[redirects]]
  from  = "/*"
  to    = "/index.html"
  status = 200

# ─── Security & Performance Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
